<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Teste de Velocidade e IP</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f0f0f0; }
    #result { margin-top: 20px; }
    button { padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <h1>Teste de Velocidade da Internet e IP Público</h1>
  <button id="startTest">Iniciar Teste</button>
  <div id="result"></div>

  <script>
    async function getPublicIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        return data.ip;
      } catch (e) {
        return 'Não foi possível obter o IP público.';
      }
    }

    function formatSpeed(bitsPerSecond) {
      const kbps = bitsPerSecond / 1024;
      const mbps = kbps / 1024;
      if (mbps >= 1) return mbps.toFixed(2) + ' Mbps';
      if (kbps >= 1) return kbps.toFixed(2) + ' Kbps';
      return bitsPerSecond.toFixed(2) + ' bps';
    }

    async function testDownloadSpeed() {
      const imageUrl = "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg"; // arquivo grande para teste (~5MB)
      const fileSizeBytes = 5242880; // 5MB em bytes

      const startTime = performance.now();
      try {
        const response = await fetch(imageUrl, {cache: "no-store"});
        const reader = response.body.getReader();
        let receivedLength = 0;
        while(true) {
          const {done, value} = await reader.read();
          if (done) break;
          receivedLength += value.length;
        }
        const endTime = performance.now();
        const durationSeconds = (endTime - startTime) / 1000;
        const bitsLoaded = fileSizeBytes * 8;
        const speedBps = bitsLoaded / durationSeconds;
        return speedBps;
      } catch (e) {
        return null;
      }
    }

    document.getElementById('startTest').addEventListener('click', async () => {
      const resultDiv = document.getElementById('result');
      resultDiv.textContent = 'Obtendo IP público...';
      const ip = await getPublicIP();
      resultDiv.textContent = `Seu IP público é: ${ip}\nIniciando teste de velocidade...`;

      const speed = await testDownloadSpeed();
      if (speed) {
        resultDiv.textContent = `Seu IP público é: ${ip}\nVelocidade estimada de download: ${formatSpeed(speed)}`;
      } else {
        resultDiv.textContent = `Seu IP público é: ${ip}\nNão foi possível medir a velocidade.`;
      }
    });
  </script>
</body>
</html>
