<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Clone Fast - Medidor de Velocidade</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
    }
    .logo {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
    }
    .logo span {
      color: #e50914;
    }
    .speed-value {
      font-size: 80px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .speed-unit {
      font-size: 24px;
      opacity: 0.8;
      margin-bottom: 30px;
    }
    .status {
      font-size: 16px;
      opacity: 0.8;
      margin-bottom: 20px;
      min-height: 20px;
    }
    .btn {
      padding: 12px 32px;
      border-radius: 999px;
      border: none;
      background: #e50914;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }
    .details {
      margin-top: 30px;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>FAST</span> clone</div>
    <div class="speed-value" id="speedValue">0</div>
    <div class="speed-unit">Mbps</div>
    <div class="status" id="statusText">Clique em “Iniciar teste”</div>
    <button class="btn" id="startBtn">Iniciar teste</button>
    <div class="details" id="detailsText"></div>
  </div>

  <script>
    const speedValueEl = document.getElementById("speedValue");
    const statusTextEl = document.getElementById("statusText");
    const detailsTextEl = document.getElementById("detailsText");
    const startBtn = document.getElementById("startBtn");

    // Configurações do teste
    const TEST_SIZE_MB = 10;      // tamanho total "simulado" em MB
    const CHUNK_SIZE_MB = 1;      // tamanho de cada "parte" em MB
    const CHUNK_DELAY_MS = 120;   // atraso para simular download (ajuste para testar)

    function bytesToMbps(bytes, seconds) {
      const bits = bytes * 8;
      const mbits = bits / (1024 * 1024);
      return mbits / seconds;
    }

    function formatNumber(n) {
      return n.toLocaleString("pt-BR", {
        maximumFractionDigits: 1,
        minimumFractionDigits: 0
      });
    }

    async function runSpeedTest() {
      const totalChunks = TEST_SIZE_MB / CHUNK_SIZE_MB;
      const chunkBytes = CHUNK_SIZE_MB * 1024 * 1024;

      let downloadedBytes = 0;
      const startTime = performance.now();

      statusTextEl.textContent = "Testando velocidade...";
      detailsTextEl.textContent = "";
      startBtn.disabled = true;
      speedValueEl.textContent = "0";

      for (let i = 1; i <= totalChunks; i++) {
        // Simula o tempo de download de um "chunk"
        await new Promise((res) => setTimeout(res, CHUNK_DELAY_MS));

        downloadedBytes += chunkBytes;
        const now = performance.now();
        const elapsedSec = (now - startTime) / 1000;
        const mbps = bytesToMbps(downloadedBytes, elapsedSec);

        speedValueEl.textContent = formatNumber(mbps);
        statusTextEl.textContent = `Baixando... (${i}/${totalChunks})`;
      }

      const endTime = performance.now();
      const totalSec = (endTime - startTime) / 1000;
      const finalMbps = bytesToMbps(downloadedBytes, totalSec);

      speedValueEl.textContent = formatNumber(finalMbps);
      statusTextEl.textContent = "Teste concluído";
      detailsTextEl.textContent =
        `Tamanho simulado: ${TEST_SIZE_MB} MB • Tempo: ${totalSec.toFixed(2)} s`;

      startBtn.disabled = false;
    }

    startBtn.addEventListener("click", () => {
      runSpeedTest().catch((err) => {
        console.error(err);
        statusTextEl.textContent = "Erro ao executar o teste.";
        startBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
